# App
spring.application.name=optimalpay-backend
server.port=8080

# Virtual Threads (Java 21 + Spring Boot 3.2+)
spring.threads.virtual.enabled=true

# Supabase PostgreSQL
# IMPORTANT: Use port 5432 (direct connection), NOT 6543 (PgBouncer)
# PgBouncer transaction mode is incompatible with JPA session features
spring.datasource.url=${SUPABASE_DB_URL}
spring.datasource.username=${SUPABASE_DB_USER}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Upstash Redis (TLS required)
spring.data.redis.url=${UPSTASH_REDIS_URL}
spring.data.redis.ssl.enabled=true

# Cache
spring.cache.type=redis

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiry-minutes=15
app.jwt.refresh-token-expiry-days=30

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=when-authorized

# Rate limiting defaults
app.rate-limit.signup-per-hour=10
app.rate-limit.login-per-hour=20
app.rate-limit.general-per-minute=100
