# Test overrides — use H2 in-memory DB, no real Redis or Postgres required

# H2 in-memory database (PostgreSQL compatibility mode)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA — let Hibernate create the schema for tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Disable Flyway for unit tests
spring.flyway.enabled=false

# Disable Redis auto-configuration for tests
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# Use simple in-memory cache for tests
spring.cache.type=simple

# JWT (test-only secret — minimum 64 characters for HS256)
app.jwt.secret=test-only-jwt-secret-key-minimum-64-characters-for-hs256-algorithm-padding-here

# Rate limiting (not enforced in tests)
app.rate-limit.signup-per-hour=10
app.rate-limit.login-per-hour=20
app.rate-limit.general-per-minute=100
